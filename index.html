<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องพักออนไลน์</title>
    <style>
        /* Layout: center page and constrain width */
        body {
            font-family: 'Sarabun', sans-serif;
            max-width: 600px;
            margin: 0 auto; /* จัดกึ่งกลาง */

            padding: 20px;            background-color: #f5f5f5;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form card: centered, block layout, box-shadow for depth */
        form {
            display: block;       /* ให้เป็น block element */
            width: 100%;
            max-width: 600px;
            margin: 0 auto;       /* จัดกึ่งกลาง */
            background-color: white;
            padding: 22px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(16,24,40,0.06); /* เพิ่มมิติ */
            transition: box-shadow .18s ease, transform .12s ease;
        }
        form:hover{ box-shadow: 0 14px 36px rgba(16,24,40,0.10); transform: translateY(-2px); }

        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 700;
        }

        /* Inputs and selects: full width, block layout */
        input, select, textarea {
            display: block; /* บังคับให้เป็นบล็อก */
            width: 100%;    /* กินความกว้างทั้งหมด */
            padding: 10px;
            border: 1px solid #e0e6ee;
            border-radius: 8px;
            box-sizing: border-box;
            transition: box-shadow .12s ease, border-color .12s ease, transform .08s ease;
        }

        /* Hover / focus effects */
        input:hover, select:hover, textarea:hover {
            border-color: #c6d9ff;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2b8cff;
            box-shadow: 0 8px 24px rgba(43,140,255,0.12);
            transform: translateY(-1px);
        }

        /* Button: full width with hover/focus shadow */
        button {
            display: block;
            width: 100%;
            background-color: #2980b9;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: box-shadow .14s ease, transform .08s ease, filter .08s ease;
        }

        button:hover {
            background-color: #2f86d1;
            box-shadow: 0 12px 30px rgba(47,134,209,0.16);
            transform: translateY(-2px);
        }
        button:focus { outline: none; box-shadow: 0 12px 30px rgba(43,140,255,0.18); }

        /* Responsive: smaller paddings on mobile */
        @media (max-width: 480px) {
            body { padding: 12px; }
            form { padding: 14px; border-radius: 8px; }
            input, select, textarea { padding: 10px; }
            button { padding: 12px; }
        }
    </style>
</head>
<body>
    <h1>แบบฟอร์มจองห้องพัก</h1>
    
    <form id="bookingForm">
        <div>
            <label for="fullname">ชื่อ-นามสกุล:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <div>
            <label for="email">อีเมล:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="phone">เบอร์โทรศัพท์:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div>
            <label for="checkin">วันที่เช็คอิน:</label>
            <input type="date" id="checkin" name="checkin" required>
        </div>

        <div>
            <label for="checkout">วันที่เช็คเอาท์:</label>
            <input type="date" id="checkout" name="checkout" required>
        </div>

        <div>
            <label for="roomtype">ประเภทห้องพัก:</label>
            <select id="roomtype" name="roomtype" required>
                <option value="">กรุณาเลือกประเภทห้องพัก</option>
                <option value="standard">ห้องมาตรฐาน</option>
                <option value="deluxe">ห้องดีลักซ์</option>
                <option value="suite">ห้องสวีท</option>
            </select>
        </div>

        <div>
            <label for="guests">จำนวนผู้เข้าพัก:</label>
            <input type="number" id="guests" name="guests" min="1" max="4" required>
        </div>

        <button type="submit">จองห้องพัก</button>
    </form>
   <script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // ตรวจสอบวันที่
        const checkin = new Date(document.getElementById('checkin').value);
        const checkout = new Date(document.getElementById('checkout').value);
        const today = new Date();
        
        if (checkin < today) {
            alert('กรุณาเลือกวันเช็คอินที่ยังไม่ผ่านมา');
            return;
        }
        
        if (checkout <= checkin) {
            alert('วันเช็คเอาท์ต้องมาหลังวันเช็คอิน');
            return;
        }
        
        // ตรวจสอบรูปแบบเบอร์โทร
        const phone = document.getElementById('phone').value;
        const phoneRegex = /^[0-9]{10}$/;
        if (!phoneRegex.test(phone)) {
            alert('กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง (10 หลัก)');
            return;
        }
        
        // คำนวณจำนวนวันที่พัก
        const days = Math.ceil((checkout - checkin) / (1000 * 60 * 60 * 24));
        
        // แสดงสรุปการจอง
        const roomtype = document.getElementById('roomtype');
        const roomtypeText = roomtype.options[roomtype.selectedIndex].text;
        
        const summary = `
            สรุปการจอง:
            - ชื่อผู้จอง: ${document.getElementById('fullname').value}
            - ประเภทห้อง: ${roomtypeText}
            - วันที่เข้าพัก: ${checkin.toLocaleDateString('th-TH')}
            - วันที่ออก: ${checkout.toLocaleDateString('th-TH')}
            - จำนวนวันที่พัก: ${days} วัน
            - จำนวนผู้เข้าพัก: ${document.getElementById('guests').value} ท่าน
        `;
        
        if (confirm(summary + '\n\nยืนยันการจองห้องพัก?')) {
            alert('จองห้องพักเรียบร้อยแล้ว');
            this.reset();
        }
    });

    // เพิ่มการตรวจสอบวันที่แบบ Real-time
    document.getElementById('checkin').addEventListener('change', function() {
        document.getElementById('checkout').min = this.value;
    });

    // จำกัดจำนวนผู้เข้าพักตามประเภทห้อง
    document.getElementById('roomtype').addEventListener('change', function() {
        const guestsInput = document.getElementById('guests');
        if (this.value === 'standard') {
            guestsInput.max = 2;
        } else if (this.value === 'deluxe') {
            guestsInput.max = 3;
        } else if (this.value === 'suite') {
            guestsInput.max = 4;
        }
        
        if (guestsInput.value > guestsInput.max) {
            guestsInput.value = guestsInput.max;
        }
});
                (function() {
                    const form = document.getElementById('bookingForm');
                    const el = id => document.getElementById(id);
                    const inpCheckin = el('checkin');
                    const inpCheckout = el('checkout');
                    const inpPhone = el('phone');
                    const inpRoom = el('roomtype');
                    const inpGuests = el('guests');

                    // ensure checkin can't be before today
                    const todayISO = (new Date()).toISOString().split('T')[0];
                    inpCheckin.min = todayISO;

                    // map room -> max guests
                    const roomMax = { standard:2, deluxe:3, suite:4 };

                    // update checkout.min when checkin changes
                    inpCheckin.addEventListener('change', () => {
                        inpCheckout.min = inpCheckin.value || todayISO;
                        if (inpCheckout.value && inpCheckout.value < inpCheckout.min) inpCheckout.value = '';
                    });

                    // update guests max when room changes
                    inpRoom.addEventListener('change', () => {
                        const max = roomMax[inpRoom.value] || 4;
                        inpGuests.max = max;
                        if (Number(inpGuests.value) > max) inpGuests.value = max;
                    });

                    // tiny UI helpers
                    const toast = msg => {
                        const t = document.createElement('div');
                        t.textContent = msg;
                        Object.assign(t.style, {position:'fixed',bottom:'18px',left:'50%',transform:'translateX(-50%)',background:'#111',color:'#fff',padding:'8px 12px',borderRadius:'8px',zIndex:9999});
                        document.body.appendChild(t);
                        setTimeout(()=>t.remove(),2200);
                    };

                    // modal confirm (returns Promise<boolean>)
                    const modalConfirm = (html) => new Promise(resolve => {
                        const overlay = document.createElement('div');
                        Object.assign(overlay.style, {position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999});
                        const box = document.createElement('div');
                        Object.assign(box.style, {background:'#fff',padding:'16px',borderRadius:'8px',maxWidth:'520px',width:'90%',boxSizing:'border-box',fontFamily:'inherit'});
                        box.innerHTML = `<div style="white-space:pre-wrap;margin-bottom:12px">${html}</div>`;
                        const bCancel = document.createElement('button'); bCancel.textContent='ยกเลิก';
                        const bOk = document.createElement('button'); bOk.textContent='ยืนยัน';
                        Object.assign(bOk.style, {marginLeft:'8px',background:'#16a34a',color:'#fff',border:'none',padding:'8px 12px',borderRadius:'6px',cursor:'pointer'});
                        Object.assign(bCancel.style, {background:'#ef4444',color:'#fff',border:'none',padding:'8px 12px',borderRadius:'6px',cursor:'pointer'});
                        const actions = document.createElement('div'); actions.style.textAlign='right'; actions.appendChild(bCancel); actions.appendChild(bOk);
                        box.appendChild(actions); overlay.appendChild(box); document.body.appendChild(overlay);
                        bCancel.addEventListener('click', ()=>{ overlay.remove(); resolve(false); });
                        bOk.addEventListener('click', ()=>{ overlay.remove(); resolve(true); });
                    });

                    // store bookings in localStorage (demo)
                    const saveBooking = b => {
                        try {
                            const list = JSON.parse(localStorage.getItem('bookings')||'[]');
                            list.unshift(b);
                            localStorage.setItem('bookings', JSON.stringify(list.slice(0,10)));
                        } catch(e) { console.warn(e); }
                    };

                    // submit handler
                    form.addEventListener('submit', async (ev) => {
                        ev.preventDefault();

                        // use HTML5 constraint validation first
                        if (!form.checkValidity()) { form.reportValidity(); return; }

                        const checkin = new Date(inpCheckin.value);
                        const checkout = new Date(inpCheckout.value);
                        const now = new Date(); now.setHours(0,0,0,0);
                        if (!inpCheckin.value || checkin < now) { inpCheckin.setCustomValidity('วันเช็คอินต้องเป็นวันนี้หรือวันถัดไป'); inpCheckin.reportValidity(); inpCheckin.setCustomValidity(''); return; }
                        if (!inpCheckout.value || checkout <= checkin) { inpCheckout.setCustomValidity('วันเช็คเอาท์ต้องหลังวันเช็คอิน'); inpCheckout.reportValidity(); inpCheckout.setCustomValidity(''); return; }

                        const phone = inpPhone.value.trim();
                        if (!/^[0-9]{10}$/.test(phone)) { inpPhone.setCustomValidity('กรุณากรอกเบอร์โทร 10 หลัก'); inpPhone.reportValidity(); inpPhone.setCustomValidity(''); return; }

                        const days = Math.ceil((checkout - checkin)/(1000*60*60*24));
                        const roomText = inpRoom.options[inpRoom.selectedIndex].text;
                        const summary = `สรุปการจอง:\n- ชื่อ: ${el('fullname').value}\n- ห้อง: ${roomText}\n- เข้า: ${checkin.toLocaleDateString('th-TH')}\n- ออก: ${checkout.toLocaleDateString('th-TH')}\n- วันพัก: ${days} วัน\n- ผู้เข้าพัก: ${inpGuests.value} ท่าน`;

                        const ok = await modalConfirm(summary + '\n\nต้องการยืนยันหรือไม่?');
                        if (!ok) { toast('ยกเลิกการจอง'); return; }

                        // save and show toast
                        saveBooking({fullname:el('fullname').value, phone, room:inpRoom.value, checkin:inpCheckin.value, checkout:inpCheckout.value, guests:inpGuests.value});
                        toast('จองห้องพักเรียบร้อยแล้ว');
                        form.reset();
                        inpCheckin.min = todayISO; inpCheckout.min = '';
                    });
                })();

</script>

</script>
</body>
</html>
